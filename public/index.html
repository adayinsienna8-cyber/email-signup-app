<!DOCTYPE html>
<html>

<head>

<title>Premium Membership</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    margin:0;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#0f172a;

}


.container{

    width:380px;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:0 20px 40px rgba(0,0,0,.3);

}



.logo{

    text-align:center;

    font-size:28px;

    font-weight:bold;

    margin-bottom:10px;

}


.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}


.offer{

    background:#111827;

    color:white;

    padding:20px;

    border-radius:15px;

    text-align:center;

    margin-bottom:25px;

}


.offer h2{

    margin:0;

    font-size:35px;

}



input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border-radius:10px;

    border:1px solid #ccc;

    font-size:15px;

}



button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:16px;

    cursor:pointer;

}



button:hover{

    background:#1d4ed8;

}



#message{

    text-align:center;

    margin-top:15px;

    font-weight:bold;

}


.footer{

    text-align:center;

    margin-top:20px;

    font-size:12px;

    color:#777;

}


</style>


</head>



<body>



<div class="container">


<div class="logo">

Premium Access

</div>



<div class="subtitle">

Create your account today

</div>



<div class="offer">

<h2>$50</h2>

<p>Premium welcome benefit</p>

</div>



<input

id="email"

type="email"

placeholder="Email address">



<input

id="password"

type="password"

placeholder="Create password">



<button onclick="signup()" id="btn">

Create Premium Account

</button>



<p id="message"></p>



<div class="footer">

By signing up you agree to our terms.

</div>



</div>





<script>


async function signup(){


let button =
document.getElementById("btn");


let message =
document.getElementById("message");



let email =
document.getElementById("email").value;



let password =
document.getElementById("password").value;



if(!email || !password){

message.innerHTML =
"Please fill all fields";

return;

}



button.innerHTML =
"Creating...";



try{


let response = await fetch("/api/signup",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


email:email,


password:password


})


});



let data =
await response.json();



message.innerHTML =
data.message;



button.innerHTML =
"Account Created";


}

catch(error){


message.innerHTML =
"Something went wrong";


button.innerHTML =
"Try Again";


}


}



</script>



</body>


</html>
